spring:
  application:
    name: jwt-auth
  datasource:
    url: jdbc:postgresql://localhost:5432/jwt_auth_db
    username: jwt_app
    password: ${DB_PASSWORD:change-me-dev-password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

springdoc:
  packages-to-scan: com.example.jwtauth
  paths-to-match: /api/v1/**
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:01234567890123456789012345678901}
    access-token-expiration: PT15M
    refresh-token-expiration: P7D
  admin-bootstrap:
    enabled: false
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:ChangeMe123!}
