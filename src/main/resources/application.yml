spring:
  application:
    name: jwt-auth
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

springdoc:
  packages-to-scan: com.example.jwtauth
  paths-to-match: /api/v1/**
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: PT15M
    refresh-token-expiration: P7D
  admin-bootstrap:
    enabled: false
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
